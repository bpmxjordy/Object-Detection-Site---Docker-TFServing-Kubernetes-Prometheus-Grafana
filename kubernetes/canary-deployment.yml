# canary-deployment.yml - Canary Deployment Strategy for Model Updates
#
# Implements the canary deployment strategy from my paper.
# When a new model version is pushed to the /models folder, this configuration
# routes a small percentage (10%) of traffic to the new model for validation.


# Canary TF Serving Deployment (New Model Version)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tf-serving-canary
  namespace: object-detection
  labels:
    app: tf-serving
    version: canary
  annotations:
    description: "Canary deployment for validating new model versions"
spec:
  # Single replica = 10% of traffic
  replicas: 1
  selector:
    matchLabels:
      app: tf-serving
      version: canary
  template:
    metadata:
      labels:
        app: tf-serving
        version: canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8501"
        prometheus.io/path: "/monitoring/prometheus/metrics"
    spec:
      containers:
        - name: tf-serving
          image: tensorflow/serving:latest-gpu
          ports:
            - containerPort: 8500
              name: grpc
            - containerPort: 8501
              name: rest
          env:
            - name: MODEL_NAME
              value: "ssd_mobilenet_v2"
          volumeMounts:
            - name: canary-model-volume
              mountPath: /models/ssd_mobilenet_v2
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "2"
              memory: "4Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /v1/models/ssd_mobilenet_v2
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/models/ssd_mobilenet_v2
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: canary-model-volume
          persistentVolumeClaim:
            claimName: canary-model-pvc
