# Deploys the TensorFlow Serving model server within Kubernetes with GPU
# support. 

# gRPC (8500) and REST (8501) ports

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tf-serving
  namespace: object-detection
  labels:
    app: tf-serving
    component: model-server
spec:
  # Number of replicas
  replicas: 1
  selector:
    matchLabels:
      app: tf-serving
  template:
    metadata:
      labels:
        app: tf-serving
        component: model-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8501"
        prometheus.io/path: "/monitoring/prometheus/metrics"
    spec:
      containers:
        - name: tf-serving
          image: tensorflow/serving:latest-gpu
          ports:
            # gRPC port 
            - containerPort: 8500
              name: grpc
              protocol: TCP
            # REST port
            - containerPort: 8501
              name: rest
              protocol: TCP
          env:
            - name: MODEL_NAME
              value: "ssd_mobilenet_v2"
          volumeMounts:
            - name: model-volume
              mountPath: /models/ssd_mobilenet_v2
              readOnly: true
          # The resource requests and limits for GPU
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
              nvidia.com/gpu: "1"    # Request 1 GPU
            limits:
              cpu: "2"
              memory: "4Gi"
              nvidia.com/gpu: "1"    # Limit to 1 GPU
          # Readiness probe will check if TF Serving is ready to accept requests
          readinessProbe:
            httpGet:
              path: /v1/models/ssd_mobilenet_v2
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 10
          # Liveness probe will check if TF Serving is ready to accept requests
          livenessProbe:
            httpGet:
              path: /v1/models/ssd_mobilenet_v2
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 15
      # Model files volume
      volumes:
        - name: model-volume
          persistentVolumeClaim:
            claimName: model-pvc

# The Flask app connects to tf-serving:8500 for gRPC communication

apiVersion: v1
kind: Service
metadata:
  name: tf-serving
  namespace: object-detection
  labels:
    app: tf-serving
spec:
  selector:
    app: tf-serving
  ports:
    # gRPC port for Flask backend communication
    - name: grpc
      port: 8500
      targetPort: 8500
      protocol: TCP
    # REST port for health checks and Prometheus metrics
    - name: rest
      port: 8501
      targetPort: 8501
      protocol: TCP
  type: ClusterIP
